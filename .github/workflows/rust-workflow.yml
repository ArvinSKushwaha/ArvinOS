on: [push]

name: CI

jobs:
  build_and_test:
    name: ArvinOS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: nightly
          override: true
      - uses: davidB/rust-cargo-make@v1
        with:
          version: 'latest'
      - name: Run tests
        run: cargo make build_and_test
