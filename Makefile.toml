[tasks.build]
clear = true
script = '''
cargo b -Z unstable-options --out-dir isodir/boot/
grub-mkrescue -o arvinos.iso isodir
'''

[tasks.build_release]
clear = true
script = '''
cargo b -r -Z unstable-options --out-dir isodir/boot/
grub-mkrescue -o arvinos.iso isodir
'''

[tasks.all]
dependencies = ["build", "build_release"]

# [tasks.build_and_test]
# clear = true
# script = '''
# cargo test
# cargo b -r -Z unstable-options --out-dir isodir/boot/
# grub-mkrescue -o arvinos.iso isodir
# '''

[tasks.run]
dependencies = ["build_release"]
script = '''
qemu-system-x86_64 -m 2048 -drive format=raw,file=arvinos.iso
'''

[tasks.run_debug]
dependencies = ["build"]
script = '''
qemu-system-x86_64 -m 2048 -drive format=raw,file=arvinos.iso
'''

[tasks.test]
disabled = true
